[project]
name = "pyhkts"
version = "0.1.0"
description = "Higher Kinded Types for Python3"
readme = "README.md"
authors = [{ name = "Ashrith Sagar", email = "ashrith9sagar@gmail.com" }]
requires-python = ">=3.10"
dependencies = ["typing-extensions"]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
test = ["pytest>=9.0.2", "pytest-memray>=1.8.0"]
lint = ["ruff>=0.15.7"]
typecheck = [
    "basedpyright>=1.38.3",
    "mypy[mypyc]>=1.19.1",
    "pyrefly>=0.57.1",
    "pyright>=1.1.408",
    "ty>=0.0.24",
]

[tool.uv.workspace]
members = ["typing_extensions"]

[tool.uv.sources]
typing-extensions = { workspace = true }
